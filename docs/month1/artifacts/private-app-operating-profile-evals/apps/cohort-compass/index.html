<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cohort Compass</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Private local product proof</p>
      <h1>Cohort Compass</h1>
      <p id="intent"></p>
    </section>
    <section class="panel">
      <h2>Private signals</h2>
      <div id="signals" class="cards"></div>
    </section>
    <section class="panel">
      <h2>Recommended next actions</h2>
      <ol id="actions"></ol>
    </section>
    <section class="panel">
      <h2>Assessment export</h2>
      <button id="exportButton" type="button">Build export preview</button>
      <pre id="exportPreview" aria-live="polite"></pre>
    </section>
  </main>
  <script type="module" src="src/app.js"></script>
</body>
</html>
