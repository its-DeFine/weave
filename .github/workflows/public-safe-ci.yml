name: Public Safe CI

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-proof-ledger:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate PR proof ledger
        run: python3 scripts/validate_pr_proof_ledger.py

  public-safe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate WEAVE package
        run: python3 packages/weave-tool/scripts/validate_company_package.py packages/weave-tool
      - name: Unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
      - name: Secret scan
        run: python3 scripts/check_no_secrets.py
      - name: Public-safe repository scan
        run: python3 scripts/public_safe_repo_scan.py
      - name: Diff check
        run: git diff --check
