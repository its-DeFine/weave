name: Public Safe CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-package-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate WEAVE company package
        run: python3 packages/weave-tool/scripts/validate_company_package.py packages/weave-tool

  public-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Runtime smoke
        run: python3 scripts/runtime_smoke.py
      - name: Operator UI smoke
        run: python3 scripts/operator_ui_smoke.py
      - name: Unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

  public-leak-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Secret scan
        run: python3 scripts/check_no_secrets.py
      - name: Public-safe repo scan
        run: python3 scripts/public_safe_repo_scan.py
