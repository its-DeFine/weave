name: secret-scan

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Scan changed files for secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}...HEAD" > changed-files.txt

      - name: Scan for secret-like assignments
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -s changed-files.txt ]; then
            echo "No changed files to scan."
            exit 0
          fi

          pattern="(api[_-]?key|token|private[_-]?key|password)[[:space:]]*[:=][[:space:]]*[\"']?[^\"'[:space:]]{8,}"
          failed=0

          while IFS= read -r file; do
            if [ ! -f "$file" ]; then
              continue
            fi

            if grep -nIE "$pattern" "$file"; then
              echo "::error file=$file::Potential secret-like assignment found. Remove the value or use a safe secret store."
              failed=1
            fi
          done < changed-files.txt

          if [ "$failed" -ne 0 ]; then
            echo "Secret scan failed: one or more changed files contain api_key, token, private_key, or password assignments."
            exit 1
          fi

          echo "Secret scan passed."
