{
  "advance_min_score_percent": 80,
  "blockers": [
    "uncited claims",
    "stale or irrelevant sources",
    "unlabeled assumptions",
    "technical feasibility only when product uncertainty is material"
  ],
  "description": "Evaluate whether research evidence covers product, market, user, antagonist, risk, and technical feasibility enough to support a selection decision.",
  "hard_gates": [
    {
      "description": "Research packet cites source references or explicit observed evidence.",
      "id": "source_refs_present",
      "kind": "manual"
    },
    {
      "description": "Facts, assumptions, and opinions are labeled separately.",
      "id": "facts_assumptions_split",
      "kind": "manual"
    },
    {
      "description": "When product uncertainty is material, Research uses or explicitly considers primitive-market-research before Selection and covers users, customers, alternatives, substitutes, competitors, antagonists, disconfirming evidence, constraints, risks, and product-market facts.",
      "id": "product_research_coverage_when_uncertain",
      "kind": "manual"
    },
    {
      "description": "Research does not pass on technical feasibility evidence alone while product, user, customer, alternative, substitute, competitor, antagonist, or value uncertainty remains central.",
      "id": "not_technical_feasibility_only",
      "kind": "manual"
    }
  ],
  "require_evidence_for_scores": true,
  "required_inputs": [
    "source list",
    "product-market facts",
    "target users and use cases",
    "customer or audience segment",
    "alternatives and substitutes",
    "competitors and antagonists",
    "disconfirming evidence",
    "constraints and risk gates",
    "technical feasibility evidence",
    "assumptions",
    "opinions",
    "decision readiness for Selection"
  ],
  "requires_review": true,
  "rubric": [
    {
      "id": "source_quality",
      "max_score": 4,
      "question": "Are sources credible, current, and relevant?"
    },
    {
      "id": "product_market_coverage",
      "max_score": 4,
      "question": "Does research cover product-market facts, target users/use cases, customer or audience segment, alternatives, substitutes, competitors, antagonists, and constraints?"
    },
    {
      "id": "risk_identification",
      "max_score": 4,
      "question": "Are major risks, unknowns, constraints, and disconfirming evidence named, including reasons the app may not matter?"
    },
    {
      "id": "technical_feasibility",
      "max_score": 4,
      "question": "Is technical feasibility supported without treating feasibility as sufficient product research?"
    },
    {
      "id": "claim_taxonomy",
      "max_score": 4,
      "question": "Are sourced facts, assumptions, and opinions separated clearly in the research packet and readback?"
    },
    {
      "id": "decision_readiness",
      "max_score": 4,
      "question": "Is there enough evidence to choose or reject a direction?"
    }
  ],
  "schema": "weave.lifecycle-eval/v0.1",
  "slug": "research",
  "stage": "Research"
}
