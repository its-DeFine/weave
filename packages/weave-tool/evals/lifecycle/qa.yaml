{
  "advance_min_score_percent": 84,
  "blockers": [
    "QA only reviewed prose",
    "target surface not exercised",
    "failure path untested",
    "public-safe scan failed",
    "runtime-agent claim lacks executed isolated topology",
    "sender/receiver readback missing or one-sided",
    "fixture/local queue substituted for live transport without claim downgrade"
  ],
  "description": "Evaluate whether actual target-surface QA proves the artifact works and fails safely.",
  "hard_gates": [
    {
      "command": "python3 scripts/runtime_smoke.py",
      "description": "Runtime smoke passes.",
      "id": "runtime_smoke_pass",
      "kind": "command",
      "timeout_seconds": 300
    },
    {
      "command": "python3 packages/weave-tool/scripts/validate_company_package.py packages/weave-tool",
      "description": "Public package validates.",
      "id": "package_validation_pass",
      "kind": "command",
      "timeout_seconds": 120
    },
    {
      "command": "python3 scripts/public_safe_repo_scan.py",
      "description": "Public-safe repository scan passes.",
      "id": "public_safe_scan_pass",
      "kind": "command",
      "redact_output": true,
      "timeout_seconds": 120
    },
    {
      "description": "Runtime-agent QA includes isolated sender/receiver topology, per-runtime config readback, scenario execution, matching evidence from both sides when applicable, and a teardown policy with lifecycle cleanup states.",
      "id": "runtime_agent_mesh_readback",
      "kind": "manual"
    }
  ],
  "require_evidence_for_scores": true,
  "required_inputs": [
    "test matrix",
    "runtime proof",
    "failure-path evidence",
    "regression notes",
    "runtime-agent QA contract when applicable",
    "runtime resource lifecycle manifest when applicable",
    "teardown policy and cleanup evidence when applicable",
    "sender and receiver readback artifacts when applicable",
    "proof-boundary claim label"
  ],
  "requires_review": true,
  "runtime_agent_qa": {
    "cleanup_policy_schema": "weave.runtime-cleanup-policy/v0.1",
    "manifest_schema": "weave.runtime-qa-manifest/v0.1",
    "resource_states_required": [
      "created",
      "running",
      "completed",
      "teardown_requested",
      "stopped",
      "removed",
      "phased_out"
    ],
    "teardown_policy_required": true
  },
  "rubric": [
    {
      "id": "happy_path_proof",
      "max_score": 4,
      "question": "Were core successful flows exercised on the right surface?"
    },
    {
      "id": "failure_path_proof",
      "max_score": 4,
      "question": "Were expected failures, blockers, and unsafe inputs tested?"
    },
    {
      "id": "regression_awareness",
      "max_score": 4,
      "question": "Were related existing behaviors protected?"
    },
    {
      "id": "rollback_clarity",
      "max_score": 4,
      "question": "Is rollback or recovery clear if this fails?"
    },
    {
      "id": "evidence_quality",
      "max_score": 4,
      "question": "Is proof fresh, reproducible, and target-surface specific?"
    },
    {
      "id": "runtime_mesh_proof",
      "max_score": 4,
      "question": "When runtime communication is claimed, were isolated runtimes launched or attached, configured with the intended model/tools, exercised through the target path, and read back from both sides?"
    }
  ],
  "schema": "weave.lifecycle-eval/v0.1",
  "slug": "qa",
  "stage": "QA"
}
